name: Actualizar datos CAFCI

on:
  push:
    paths:
      - 'uploads/*.xlsx'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Instalar Python y dependencias
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Procesar Excel → JSON + historial
        run: |
          EXCEL=$(ls uploads/*.xlsx 2>/dev/null | head -1)
          if [ -z "$EXCEL" ]; then
            echo "ERROR: No se encontró archivo Excel"
            exit 1
          fi
          echo "Procesando: $EXCEL"
          python scripts/process_excel.py "$EXCEL"

      - name: Borrar el Excel
        run: rm -f uploads/*.xlsx

      - name: Guardar cambios
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/cafci_data.json data/cafci_history.json data/cafci_aum_history.json
          git rm --cached uploads/*.xlsx 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Datos CAFCI $(date +'%d/%m/%Y')"
          git push

  deploy:
    needs: process
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4
