name: Descarga y actualización automática CAFCI

on:
  schedule:
    - cron: '0 23 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  download-and-process:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Instalar Python y dependencias
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar pandas y openpyxl
        run: pip install pandas openpyxl requests

      - name: Descargar planilla desde CAFCI
        run: |
          python3 - << 'PYEOF'
          import requests, os
          from datetime import datetime
          url = "https://api.pub.cafci.org.ar/pb_get"
          print(f"Descargando planilla desde {url}...")
          r = requests.get(url, timeout=60, headers={
            "User-Agent": "Mozilla/5.0 (compatible; CAFCI-Dashboard/1.0)"
          })
          r.raise_for_status()
          today = datetime.today().strftime('%Y%m%d')
          filename = f"uploads/{today}_Planilla_Diaria_A.xlsx"
          os.makedirs("uploads", exist_ok=True)
          with open(filename, "wb") as f:
            f.write(r.content)
          print(f"Descargado: {filename} ({len(r.content)/1024:.0f} KB)")
          PYEOF

      - name: Procesar Excel → JSON
        run: |
          EXCEL=$(ls uploads/*.xlsx | head -1)
          echo "Procesando: $EXCEL"
          python scripts/process_excel.py "$EXCEL"

      - name: Borrar el Excel
        run: rm -f uploads/*.xlsx

      - name: Guardar datos actualizados
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/cafci_data.json
          git diff --cached --quiet || git commit -m "Datos CAFCI $(date +'%d/%m/%Y')"
          git push

  deploy:
    needs: download-and-process
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
